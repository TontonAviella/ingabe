# Dagster instance configuration
# Used by both dagster-webserver and dagster-daemon

storage:
  postgres:
    postgres_url:
      env: DAGSTER_PG_URL

run_launcher:
  module: dagster.core.launcher
  class: DefaultRunLauncher

run_coordinator:
  module: dagster.core.run_coordinator
  class: DefaultRunCoordinator

telemetry:
  enabled: false

retention:
  schedule:
    purge_after_days: 30
  sensor:
    purge_after_days: 30
