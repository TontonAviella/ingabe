# Production override for Hetzner VPS deployment (CPX42: 8 vCPU, 16 GB RAM, 320 GB SSD)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Note: UFW on the VPS restricts external access to ports 22, 80, 443 only.
# The app's port 8000 (from base compose) is not reachable externally.

services:
  # --- Nginx reverse proxy (SSL termination + MinIO proxy) ---
  nginx:
    build: ./nginx
    container_name: mundi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
      - minio
    restart: unless-stopped
    networks:
      default:
        # Docker-internal DNS aliases so app's S3 client resolves
        # s3.gis.nozalabs.rw to nginx (stays in Docker network, no hairpin NAT)
        aliases:
          - gis.nozalabs.rw
          - s3.gis.nozalabs.rw
          - s3-gis.nozalabs.rw

  # --- App: production overrides ---
  app:
    restart: unless-stopped
    # 8 vCPU → 6 workers (leave headroom for GDAL subprocesses + PostGIS)
    command: >
      bash -c "alembic upgrade head &&
      uvicorn src.wsgi:app --host 0.0.0.0 --port 8000
      --workers ${WEB_CONCURRENCY:-6} --log-level info
      --proxy-headers --forwarded-allow-ips='*'"
    environment:
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-6}
      - DB_POOL_MAX_SIZE=${DB_POOL_MAX_SIZE:-10}
      # GDAL env vars for rio-tiler COG reads via S3/HTTP
      - GDAL_CACHEMAX=256
      - GDAL_HTTP_MERGE_CONSECUTIVE_RANGES=YES
      - GDAL_HTTP_MULTIPLEX=YES
      - GDAL_BAND_BLOCK_CACHE=HASHSET
      - VSI_CACHE=TRUE
      - VSI_CACHE_SIZE=33554432
      # Skip TLS verification for vsicurl — internal Docker network only,
      # cert is for s3.gis but URL hostname is s3-gis (no MITM risk on loopback).
      - GDAL_HTTP_UNSAFESSL=YES
      # Internal MinIO endpoint for QGIS geoprocessing presigned URLs.
      # The QGIS container uses urllib (not GDAL) to download input layers, and
      # urllib validates TLS certs — the external S3 cert doesn't cover s3-gis.nozalabs.rw
      # when accessed via Docker-internal DNS, so we sign presigned URLs with the
      # internal hostname instead. QGIS container can reach minio:9000 on Docker network.
      - S3_INTERNAL_ENDPOINT_URL=http://minio:9000
      # Phase 2 Clay embedding paths (checkpoint bind-mounted from host).
      - CLAY_CHECKPOINT_PATH=/app/data/clay-checkpoints/clay-v1.5.ckpt
      - CLAY_METADATA_PATH=/app/clay-source/configs/metadata.yaml
    volumes:
      # Phase 2 — Clay v1.5 checkpoint (4.9 GB). Read-only bind mount from
      # host so the heavy file lives outside the image. To populate on a
      # new host: download via `curl -fsSL -o data/clay-checkpoints/clay-v1.5.ckpt
      # https://huggingface.co/made-with-clay/Clay/resolve/main/v1.5/clay-v1.5.ckpt`
      - ./data/clay-checkpoints:/app/data/clay-checkpoints:ro
    deploy:
      resources:
        limits:
          memory: 10G

  # --- Hermes Agent gateway (Phase 2 sidecar; default profile off until configured) ---
  # Re-uses the mundi-public:local image (Hermes is installed there via PR #44).
  # Runs `hermes gateway run` as a long-lived daemon. Holds messaging channel
  # state (WhatsApp QR pairings, Telegram tokens, Slack manifests) and the
  # ingabe-sage plugin in /app/hermes_integration/plugins.
  #
  # The gateway is only reachable from the docker-internal network; UFW on the
  # host doesn't expose it externally. mundi-app talks to it over the docker
  # bridge at hermes-gateway:<acp-port> (port wired in PR #47 once ACP dep is
  # added).
  #
  # State directory: /home/appuser/.hermes is a named volume so QR pairings +
  # session checkpoints + profiles survive container restarts.
  #
  # SAFETY: this service is in the compose file but the runtime cutover is
  # gated by MUNDI_USE_HERMES=0 on the app service. The gateway can be
  # running while users continue on the hand-rolled chat loop — no automatic
  # routing happens until the flag flips.
  hermes-gateway:
    image: "${APP_IMAGE:-mundi-public:local}"
    container_name: mundi-hermes-gateway
    # `hermes gateway run` is the foreground daemon. -v for INFO logs (we want
    # to see channel handshakes during early soak). --accept-hooks avoids TTY
    # prompts for shell-script hook consent (we don't ship hooks today).
    command: >
      /app/.venv/bin/hermes gateway run -v --accept-hooks
    environment:
      # Inherit LLM provider config from .env (same key as mundi-app uses).
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Force HOME so `hermes` finds its state directory inside the volume.
      - HOME=/home/appuser
      # Acknowledge first-run prompts non-interactively (we're in a daemon).
      - HERMES_ACCEPT_HOOKS=1
    volumes:
      # Hermes state — profiles, sessions, channel credentials, hooks allowlist.
      # Named volume = survives restarts but stays isolated from host filesystem.
      - hermes-state:/home/appuser
      # ingabe-sage plugin read-only from the host project tree. The gateway
      # picks up plugins from ~/.hermes/plugins; we symlink in via volume.
      # NOTE: the actual plugin loading wiring is in PR #45+ — for now this
      # mount is forward-compatible but unused by the running gateway.
      - ./hermes_integration/plugins:/home/appuser/.hermes/plugins:ro
    restart: unless-stopped
    # No `ports:` block — the gateway is internal-only. mundi-app reaches it
    # via docker DNS at `hermes-gateway:<port>` once ACP wiring lands.
    depends_on:
      # Gateway doesn't need the app, but waits for postgres in case future
      # plugin handlers want to call back into mundi-app for tool execution
      # (the reverse-callback pattern in project_unified_account_design.md).
      - postgresdb
    deploy:
      resources:
        limits:
          # Modest cap — gateway is the orchestrator brain, not heavy compute.
          # Real LLM cost lives on OpenRouter; gateway just shepherds requests.
          memory: 1G

  # --- PostgreSQL: tuned for PostGIS on 16 GB host ---
  postgresdb:
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "max_wal_size=2GB"
    deploy:
      resources:
        limits:
          memory: 4G

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  qgis-processing:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  # mc: kept — one-shot S3 user setup (~3s, exits immediately)
  # backup: already has restart: unless-stopped in base

  # --- Qdrant for Phase 2 Clay embedding similarity search ---
  # Single Rust binary, no etcd/minio dependencies. Stores 1024-dim Clay v1.5
  # tile embeddings tagged with (layer_id, partner_id, tile_x, tile_y) for
  # find_similar_tiles. No host port binding — only mundi-app reaches it.
  # Replaced Milvus standalone (image was 1.7 GB + etcd + minio bundled);
  # Qdrant is one process, ~50-100 MiB resident at our scale.
  qdrant:
    container_name: mundi-qdrant
    image: qdrant/qdrant:v1.17.1
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
      # Storage on a named volume so data survives container restarts.
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant image ships neither wget nor curl, but bash has /dev/tcp for a
      # cheap TCP-level liveness probe. The HTTP /healthz endpoint can't be
      # checked from inside the container without adding a tool to the image.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      start_period: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - default

  # --- Disable dev-only services ---
  dagster-daemon:
    profiles: ["dev"]

  superset:
    profiles: ["dev"]

  prometheus:
    profiles: ["dev"]

  grafana:
    profiles: ["dev"]

  tempo:
    profiles: ["dev"]

volumes:
  qdrant_data:
  # Hermes Agent gateway state: profiles, sessions, channel credentials,
  # checkpoints. Lives outside the host filesystem so it can't be clobbered
  # by deploy.sh; `hermes backup` is the canonical export path.
  hermes-state:
