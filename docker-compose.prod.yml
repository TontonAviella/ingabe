# Production override for Hetzner VPS deployment (CPX42: 8 vCPU, 16 GB RAM, 320 GB SSD)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Note: UFW on the VPS restricts external access to ports 22, 80, 443 only.
# The app's port 8000 (from base compose) is not reachable externally.

services:
  # --- Nginx reverse proxy (SSL termination + MinIO proxy) ---
  nginx:
    build: ./nginx
    container_name: mundi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
      - minio
    restart: unless-stopped
    networks:
      default:
        # Docker-internal DNS aliases so app's S3 client resolves
        # s3.gis.nozalabs.rw to nginx (stays in Docker network, no hairpin NAT)
        aliases:
          - gis.nozalabs.rw
          - s3.gis.nozalabs.rw
          - s3-gis.nozalabs.rw

  # --- App: production overrides ---
  app:
    restart: unless-stopped
    # 8 vCPU → 6 workers (leave headroom for GDAL subprocesses + PostGIS)
    command: >
      bash -c "alembic upgrade head &&
      uvicorn src.wsgi:app --host 0.0.0.0 --port 8000
      --workers ${WEB_CONCURRENCY:-6} --log-level info
      --proxy-headers --forwarded-allow-ips='*'"
    environment:
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-6}
      - DB_POOL_MAX_SIZE=${DB_POOL_MAX_SIZE:-10}
      # Hermes Phase 2 flags.
      # MUNDI_USE_HERMES=0 (default) → existing hand-rolled chat loop.
      # MUNDI_USE_HERMES=1 → src/services/hermes_runtime.py dispatches
      # through the Hermes Agent gateway sidecar. Rollback = back to 0
      # + restart. See CLAUDE.md "Hermes Phase 2".
      - MUNDI_USE_HERMES=${MUNDI_USE_HERMES:-0}
      # MUNDI_TOOL_CALL_ENABLED=0 (default) → /internal/tool-call returns
      # 503. Flip to 1 to let the Hermes plugin call back into mundi for
      # Sage tools (PR #55 dispatch + PR #57 shim — every legacy tool now
      # has a real handler). Should be 1 in any deployment that also runs
      # MUNDI_USE_HERMES=1, otherwise Hermes turns will dead-letter on
      # the first tool call.
      - MUNDI_TOOL_CALL_ENABLED=${MUNDI_TOOL_CALL_ENABLED:-0}
      # GDAL env vars for rio-tiler COG reads via S3/HTTP
      - GDAL_CACHEMAX=256
      - GDAL_HTTP_MERGE_CONSECUTIVE_RANGES=YES
      - GDAL_HTTP_MULTIPLEX=YES
      - GDAL_BAND_BLOCK_CACHE=HASHSET
      - VSI_CACHE=TRUE
      - VSI_CACHE_SIZE=33554432
      # Skip TLS verification for vsicurl — internal Docker network only,
      # cert is for s3.gis but URL hostname is s3-gis (no MITM risk on loopback).
      - GDAL_HTTP_UNSAFESSL=YES
      # Internal MinIO endpoint for QGIS geoprocessing presigned URLs.
      # The QGIS container uses urllib (not GDAL) to download input layers, and
      # urllib validates TLS certs — the external S3 cert doesn't cover s3-gis.nozalabs.rw
      # when accessed via Docker-internal DNS, so we sign presigned URLs with the
      # internal hostname instead. QGIS container can reach minio:9000 on Docker network.
      - S3_INTERNAL_ENDPOINT_URL=http://minio:9000
      # Phase 2 Clay embedding paths (checkpoint bind-mounted from host).
      - CLAY_CHECKPOINT_PATH=/app/data/clay-checkpoints/clay-v1.5.ckpt
      - CLAY_METADATA_PATH=/app/clay-source/configs/metadata.yaml
    volumes:
      # Phase 2 — Clay v1.5 checkpoint (4.9 GB). Read-only bind mount from
      # host so the heavy file lives outside the image. To populate on a
      # new host: download via `curl -fsSL -o data/clay-checkpoints/clay-v1.5.ckpt
      # https://huggingface.co/made-with-clay/Clay/resolve/main/v1.5/clay-v1.5.ckpt`
      - ./data/clay-checkpoints:/app/data/clay-checkpoints:ro
    deploy:
      resources:
        limits:
          memory: 10G

  # --- Hermes Agent gateway (Phase 2 sidecar; default profile off until configured) ---
  # Re-uses the mundi-public:local image (Hermes is installed there via PR #44).
  # Runs `hermes gateway run` as a long-lived daemon. Holds messaging channel
  # state (WhatsApp QR pairings, Telegram tokens, Slack manifests) and the
  # ingabe-sage plugin in /app/hermes_integration/plugins.
  #
  # The gateway is only reachable from the docker-internal network; UFW on the
  # host doesn't expose it externally. mundi-app talks to it over the docker
  # bridge at hermes-gateway:<acp-port> (port wired in PR #47 once ACP dep is
  # added).
  #
  # State directory: /home/appuser/.hermes is a named volume so QR pairings +
  # session checkpoints + profiles survive container restarts.
  #
  # SAFETY: this service is in the compose file but the runtime cutover is
  # gated by MUNDI_USE_HERMES=0 on the app service. The gateway can be
  # running while users continue on the hand-rolled chat loop — no automatic
  # routing happens until the flag flips.
  hermes-gateway:
    # Gated behind the `hermes` compose profile so `docker compose up -d`
    # (default) does NOT bring this up. Operators opt in once first-run
    # config is in place:
    #   docker compose --profile hermes -f ...prod.yml up -d hermes-gateway
    # Before first up: bootstrap config.yaml + at least one profile via
    # `docker run --rm -v hermes-state:/home/appuser mundi-public:local
    #  /app/.venv/bin/hermes setup` (interactive). See PR #44 deploy notes.
    profiles: ["hermes"]
    image: "${APP_IMAGE:-mundi-public:local}"
    container_name: mundi-hermes-gateway
    # `hermes gateway run` is the foreground daemon. -v for INFO logs (we want
    # to see channel handshakes during early soak). --accept-hooks avoids TTY
    # prompts for shell-script hook consent (we don't ship hooks today).
    #
    # The leading `mkdir -p ... && ln -sfn ...` symlinks our in-image plugin
    # path into the directory Hermes scans for user plugins (~/.hermes/plugins).
    # See `hermes_cli/plugins.py:get_bundled_plugins_dir()` — Hermes checks
    # ${HERMES_HOME}/plugins/<name>/ alongside its own bundled plugins dir.
    # We can't override HERMES_BUNDLED_PLUGINS because that would clobber the
    # built-in channel adapters (Telegram/WhatsApp/Slack/etc). User-plugin
    # scan is additive and the right hook.
    command: >
      sh -c "mkdir -p /home/appuser/.hermes/plugins
      && ln -sfn /app/hermes_integration/plugins/ingabe-sage
      /home/appuser/.hermes/plugins/ingabe-sage
      && exec /app/.venv/bin/hermes gateway run -v --accept-hooks"
    environment:
      # Inherit LLM provider config from .env (same key as mundi-app uses).
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Force HOME so `hermes` finds its state directory inside the volume.
      - HOME=/home/appuser
      # Acknowledge first-run prompts non-interactively (we're in a daemon).
      - HERMES_ACCEPT_HOOKS=1
      # Tool-call proxy: ingabe-sage's proxied handlers POST to this URL
      # with an HMAC-signed body. Service-DNS resolves inside the compose
      # network; both fields are required for tool dispatch to work.
      - MUNDI_APP_URL=${MUNDI_APP_URL:-http://app:8000}
      - HERMES_GATEWAY_SECRET=${HERMES_GATEWAY_SECRET:-}
    volumes:
      # Hermes state — profiles, sessions, channel credentials, hooks allowlist.
      # Named volume = survives restarts but stays isolated from host filesystem.
      - hermes-state:/home/appuser
      # NOTE: plugin code lives inside the image at /app/hermes_integration/
      # (baked by `COPY . /app/` in the Dockerfile). The `ln -sfn` in the
      # command above exposes it to Hermes via the user-plugins scan path.
      # We do NOT bind-mount the plugin dir from the host because mounting
      # under /home/appuser/.hermes/ interacts badly with the named volume
      # (root-owned overlays + PermissionError on /home/appuser/.hermes/logs).
    restart: unless-stopped
    # No `ports:` block — the gateway is internal-only. mundi-app reaches it
    # via docker DNS at `hermes-gateway:<port>` once ACP wiring lands.
    depends_on:
      # Gateway doesn't need the app, but waits for postgres in case future
      # plugin handlers want to call back into mundi-app for tool execution
      # (the reverse-callback pattern in project_unified_account_design.md).
      - postgresdb
    deploy:
      resources:
        limits:
          # Modest cap — gateway is the orchestrator brain, not heavy compute.
          # Real LLM cost lives on OpenRouter; gateway just shepherds requests.
          memory: 1G

  # --- Hermes ACP TCP bridge ---
  # mundi-app talks ACP (Agent Client Protocol) to the hermes-gateway, but
  # hermes-acp speaks JSON-RPC over stdin/stdout only. This bridge listens
  # on a docker-internal TCP port and spawns hermes-acp per connection,
  # piping the socket's bytes to/from the subprocess.
  #
  # See hermes_integration/bridge/acp_tcp_bridge.py for the implementation.
  # Internal-only: no `ports:` exposure to the host network.
  #
  # Profile-gated: `--profile hermes` activation, same as the gateway.
  # When mundi-app's MUNDI_USE_HERMES=0 (default), this service can be
  # stopped without affecting users. When MUNDI_USE_HERMES=1, this service
  # MUST be running for run_sage_turn_via_hermes() to function.
  hermes-acp-bridge:
    profiles: ["hermes"]
    image: "${APP_IMAGE:-mundi-public:local}"
    container_name: mundi-hermes-acp-bridge
    command: >
      /app/.venv/bin/python -m hermes_integration.bridge.acp_tcp_bridge
    environment:
      - HOME=/home/appuser
      - ACP_BRIDGE_PORT=9999
      - ACP_BRIDGE_HOST=0.0.0.0
      # hermes-acp's `_resolve_custom_runtime` reads ALL THREE of these
      # to build the LLM client. Missing OPENAI_BASE_URL was the cause of
      # the "no endpoint credentials" warning + empty prompt response we
      # caught 2026-05-15: config.yaml had the base_url, but hermes-acp's
      # auxiliary-client resolver falls back to env when its internal
      # `resolve_runtime_provider("custom")` doesn't return a complete dict.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      # The bridge needs to spawn hermes-acp, which reads ~/.hermes/config.yaml
      # for model + provider settings AND writes ~/.hermes/logs/agent.log
      # during session/new. Must be `:rw` — the gateway is single-process,
      # spawned hermes-acp subprocesses are short-lived per-turn, so write
      # contention isn't a real concern. Earlier `:ro` blocked session/new
      # with Errno 30 (read-only fs) caught 2026-05-15.
      - hermes-state:/home/appuser:rw
      # The bridge module itself lives in the application source tree.
      # We mount the worktree's hermes_integration/ at the matching path
      # inside the container so `python -m hermes_integration.bridge....`
      # resolves. NOTE: this requires the bridge code to be deployed on
      # the host before bringing this service up.
      - ./hermes_integration:/app/hermes_integration:ro
    restart: unless-stopped
    depends_on:
      - postgresdb
    deploy:
      resources:
        limits:
          # Bridge is just byte-pumping. Each connection spawns a
          # hermes-acp subprocess which is the heavier process. Cap at
          # 512M for the bridge itself; subprocesses are accounted to
          # this cgroup but get their own implicit budget.
          memory: 512M

  # --- PostgreSQL: tuned for PostGIS on 16 GB host ---
  postgresdb:
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "max_wal_size=2GB"
    deploy:
      resources:
        limits:
          memory: 4G

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  qgis-processing:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  # mc: kept — one-shot S3 user setup (~3s, exits immediately)
  # backup: already has restart: unless-stopped in base

  # --- Qdrant for Phase 2 Clay embedding similarity search ---
  # Single Rust binary, no etcd/minio dependencies. Stores 1024-dim Clay v1.5
  # tile embeddings tagged with (layer_id, partner_id, tile_x, tile_y) for
  # find_similar_tiles. No host port binding — only mundi-app reaches it.
  # Replaced Milvus standalone (image was 1.7 GB + etcd + minio bundled);
  # Qdrant is one process, ~50-100 MiB resident at our scale.
  qdrant:
    container_name: mundi-qdrant
    image: qdrant/qdrant:v1.17.1
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
      # Storage on a named volume so data survives container restarts.
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant image ships neither wget nor curl, but bash has /dev/tcp for a
      # cheap TCP-level liveness probe. The HTTP /healthz endpoint can't be
      # checked from inside the container without adding a tool to the image.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      start_period: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - default

  # --- Disable dev-only services ---
  dagster-daemon:
    profiles: ["dev"]

  superset:
    profiles: ["dev"]

  prometheus:
    profiles: ["dev"]

  grafana:
    profiles: ["dev"]

  tempo:
    profiles: ["dev"]

volumes:
  qdrant_data:
  # Hermes Agent gateway state: profiles, sessions, channel credentials,
  # checkpoints. Lives outside the host filesystem so it can't be clobbered
  # by deploy.sh; `hermes backup` is the canonical export path.
  hermes-state:
