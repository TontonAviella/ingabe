# Prometheus configuration for Mundi.ai
# Scrapes the /metrics endpoint exposed by the FastAPI app

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "mundi-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: "ingabe"
          environment: "development"
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
