worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Docker embedded DNS resolver. Without this, nginx resolves
    # `proxy_pass http://app:8000` ONCE at config load and caches the
    # container IP forever. After `docker compose up -d app`, the new
    # container gets a new IP (e.g., 172.18.0.8 → 172.18.0.13), nginx
    # keeps hitting the dead IP, every external request 502s silently.
    # Hit 2026-05-15: ~7h of silent outage after a routine app recreate.
    #
    # 127.0.0.11 is Docker's embedded DNS server. `valid=10s` re-resolves
    # at most once per 10s — amortizes the lookup cost. Pair this with
    # variable-based proxy_pass targets (set $up app:8000; proxy_pass $up;)
    # in mundi.conf so nginx re-resolves on each request instead of
    # baking the IP at boot.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Gzip compression — compresses JSON, GeoJSON, MVT, JS, CSS
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/geo+json
        application/vnd.mapbox-vector-tile
        application/x-protobuf
        image/svg+xml;

    # Nginx-level tile cache — caches rendered PNG tiles in /tmp/nginx_tile_cache
    proxy_cache_path /tmp/nginx_tile_cache
        levels=1:2
        keys_zone=tiles:10m
        max_size=512m
        inactive=1h
        use_temp_path=off;

    include /etc/nginx/conf.d/*.conf;
}
