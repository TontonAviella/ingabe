worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip compression — compresses JSON, GeoJSON, MVT, JS, CSS
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/geo+json
        application/vnd.mapbox-vector-tile
        application/x-protobuf
        image/svg+xml;

    # Nginx-level tile cache — caches rendered PNG tiles in /tmp/nginx_tile_cache
    proxy_cache_path /tmp/nginx_tile_cache
        levels=1:2
        keys_zone=tiles:10m
        max_size=512m
        inactive=1h
        use_temp_path=off;

    include /etc/nginx/conf.d/*.conf;
}
