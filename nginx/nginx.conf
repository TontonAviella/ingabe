# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# --- HTTP: redirect to HTTPS + ACME challenge ---
server {
    listen 80;
    server_name gis.nozalabs.rw s3.gis.nozalabs.rw s3-gis.nozalabs.rw;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main app: gis.nozalabs.rw ---
server {
    listen 443 ssl;
    http2 on;
    server_name gis.nozalabs.rw;

    ssl_certificate     /etc/letsencrypt/live/gis.nozalabs.rw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gis.nozalabs.rw/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 500M;

    # Vite-built assets — immutable hashed filenames, cache forever
    location /assets/ {
        proxy_pass http://app:8000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Raster tile cache — nginx caches rendered PNG tiles to reduce backend load.
    # MapLibre fires 20-50 tile requests per zoom/pan; nginx serves cached tiles
    # in ~1ms vs ~200ms for a backend COG render.
    location ~ ^/api/layer/[^/]+/\d+/\d+/\d+\.png$ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache tiles;
        proxy_cache_valid 200 1h;
        proxy_cache_valid 304 1h;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Satellite tile cache — Sentinel Hub WMS tiles proxied through backend
    location ~ ^/api/satellite/\d+/\d+/\d+\.png$ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache tiles;
        proxy_cache_valid 200 1h;
        proxy_cache_valid 304 1h;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Vector tile passthrough — no rate limit, same rationale as raster tiles.
    # MapLibre fires 20-40 MVT requests per layer per zoom/pan; rate limiting
    # these causes 503s when multiple vector layers are visible.
    location ~ ^/api/layer/[^/]+/\d+/\d+/\d+\.mvt$ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade for real-time chat/tool execution
    location ~* /ws/ {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # All other requests → FastAPI
    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        limit_req zone=api burst=50 nodelay;
    }
}

# --- MinIO S3 proxy: s3.gis.nozalabs.rw + s3-gis.nozalabs.rw (one-level for Cloudflare) ---
server {
    listen 443 ssl;
    http2 on;
    server_name s3.gis.nozalabs.rw s3-gis.nozalabs.rw;

    ssl_certificate     /etc/letsencrypt/live/gis.nozalabs.rw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gis.nozalabs.rw/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10G;
    proxy_buffering off;
    proxy_request_buffering off;

    # Large-file upload timeouts (drone orthophotos over African internet)
    proxy_connect_timeout 60s;
    proxy_send_timeout 86400s;
    proxy_read_timeout 86400s;
    client_body_timeout 86400s;
    send_timeout 86400s;

    # Handle CORS preflight requests
    location / {
        # Strip any CORS headers from MinIO to avoid duplicates
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        # CORS headers for browser-based PMTiles Range requests and S3 uploads
        add_header Access-Control-Allow-Origin "https://gis.nozalabs.rw" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, PUT, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type, Content-Length, Authorization, X-Amz-Content-Sha256, X-Amz-Date, X-Amz-User-Agent" always;
        add_header Access-Control-Expose-Headers "Content-Range, Accept-Ranges, Content-Length, ETag" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://gis.nozalabs.rw";
            add_header Access-Control-Allow-Methods "GET, HEAD, PUT, POST, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Range, Content-Type, Content-Length, Authorization, X-Amz-Content-Sha256, X-Amz-Date, X-Amz-User-Agent";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
