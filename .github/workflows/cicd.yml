name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application images
        run: |
          docker buildx bake \
            --set app.cache-from=type=gha \
            --set app.cache-to=type=gha,mode=max \
            --set qgis-processing.cache-from=type=gha \
            --set qgis-processing.cache-to=type=gha,mode=max \
            --set app.args.VITE_WEBSITE_DOMAIN=http://localhost:8000 \
            --file docker-compose.yml \
            --load
        timeout-minutes: 45

      - name: Run tests
        run: docker compose run app pytest -xvs -n auto
        timeout-minutes: 10
