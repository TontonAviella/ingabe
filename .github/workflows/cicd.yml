name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'Dockerfile.base'
      - 'noza-web/**'
      - '.github/workflows/build-base-image.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'Dockerfile.base'
      - 'noza-web/**'
      - '.github/workflows/build-base-image.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application images
        run: |
          docker buildx bake \
            --set app.cache-from=type=gha \
            --set app.cache-to=type=gha,mode=max \
            --set qgis-processing.cache-from=type=gha \
            --set qgis-processing.cache-to=type=gha,mode=max \
            --set app.args.VITE_WEBSITE_DOMAIN=http://localhost:8000 \
            --set app.args.VITE_POSTHOG_KEY=${{ secrets.VITE_POSTHOG_KEY }} \
            --set app.args.VITE_POSTHOG_HOST=https://us.i.posthog.com \
            --file docker-compose.yml \
            --load
        timeout-minutes: 45

      - name: Run tests
        run: docker compose run app pytest -vs -n auto --ignore=src/test_worldcover.py
        timeout-minutes: 10
        continue-on-error: true  # TODO: fix pre-existing test failures, then remove this
