name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'Dockerfile.base'
      - 'noza-web/**'
      - '.github/workflows/build-base-image.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'Dockerfile.base'
      - 'noza-web/**'
      - '.github/workflows/build-base-image.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build application images
        run: |
          docker buildx bake \
            --set app.cache-from=type=gha \
            --set app.cache-to=type=gha,mode=max \
            --set qgis-processing.cache-from=type=gha \
            --set qgis-processing.cache-to=type=gha,mode=max \
            --set app.args.VITE_WEBSITE_DOMAIN=http://localhost:8000 \
            --set app.args.VITE_POSTHOG_KEY=${{ secrets.VITE_POSTHOG_KEY }} \
            --set app.args.VITE_POSTHOG_HOST=https://us.i.posthog.com \
            --file docker-compose.yml \
            --load
        timeout-minutes: 45

      - name: System info pre-test
        run: |
          echo "=== CPU ==="
          nproc
          echo "=== Memory baseline ==="
          free -mh
          echo "=== /proc/meminfo top ==="
          head -10 /proc/meminfo
          echo "=== Docker info ==="
          docker info 2>/dev/null | grep -iE 'memory|cpus|limit' || true

      - name: Start memory monitor
        run: |
          mkdir -p /tmp/ci-diag
          (
            while true; do
              echo "$(date -Iseconds) $(free -m | awk '/^Mem:/ {print "total="$2" used="$3" available="$7}')"
              sleep 5
            done
          ) > /tmp/ci-diag/memory.log 2>&1 &
          echo $! > /tmp/ci-diag/monitor.pid

      - name: Run tests
        # -n 2 (was -n auto): pytest-xdist on ubuntu-latest's 4 vCPUs/7 GB RAM
        # was OOM-killing workers because conftest.py imports the full FastAPI
        # app (Clay v1.5, pymilvus, rasterio/GDAL) into every worker. 4 workers
        # × ~2 GB resident = 8 GB > 7 GB ceiling. -n 2 caps at ~4 GB.
        # --dist=loadfile keeps each test file's tests in one worker so
        # import cost amortizes across the file.
        # timeout 10→20 because lower parallelism = longer wall clock.
        run: docker compose run app pytest -vs -n 2 --dist=loadfile --ignore=src/test_worldcover.py
        timeout-minutes: 20

      - name: Post-test diagnostics
        if: always()
        run: |
          kill "$(cat /tmp/ci-diag/monitor.pid 2>/dev/null)" 2>/dev/null || true
          echo "=== Memory peak from monitor ==="
          if [ -f /tmp/ci-diag/memory.log ]; then
            awk '/total=/ {
              for (i=2; i<=NF; i++) {
                if ($i ~ /^used=/) { gsub("used=", "", $i); u=$i+0 }
                if ($i ~ /^total=/) { gsub("total=", "", $i); t=$i+0 }
              }
              if (u > peak) peak = u
              total = t
              count++
            } END {
              print "samples=" count " peak_used_mb=" peak " total_mb=" total
              if (total > 0) printf "peak_pct=%.1f%%\n", (peak/total)*100
            }' /tmp/ci-diag/memory.log
            echo "=== Last 10 memory samples ==="
            tail -10 /tmp/ci-diag/memory.log
          fi
          echo "=== OOM kills in dmesg ==="
          sudo dmesg 2>/dev/null | grep -iE 'killed process|out of memory|oom-killer' | tail -20 || echo "(dmesg unavailable)"
          echo "=== Final memory ==="
          free -mh
          echo "=== Docker containers ==="
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Size}}'

      - name: Start services for E2E
        run: |
          docker compose up -d app
          # Wait for the app to be healthy
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/healthz > /dev/null 2>&1; then
              echo "App is healthy"
              break
            fi
            echo "Waiting for app to start... ($i/30)"
            sleep 2
          done
        timeout-minutes: 5

      - name: Install frontend dependencies
        working-directory: frontendts
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontendts
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        working-directory: frontendts
        run: npx playwright test --reporter=github
        env:
          E2E_BASE_URL: http://localhost:8000
        timeout-minutes: 5

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: frontendts/test-results/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down
