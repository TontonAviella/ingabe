name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'Dockerfile.base'
      - 'noza-web/**'
      - '.github/workflows/build-base-image.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'Dockerfile.base'
      - 'noza-web/**'
      - '.github/workflows/build-base-image.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Report disk space
        run: df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build application images
        run: |
          docker buildx bake app \
            --set app.cache-from=type=gha \
            --set app.cache-to=type=gha,mode=max \
            --set app.args.VITE_WEBSITE_DOMAIN=http://localhost:8000 \
            --set app.args.VITE_POSTHOG_KEY=${{ secrets.VITE_POSTHOG_KEY }} \
            --set app.args.VITE_POSTHOG_HOST=https://us.i.posthog.com \
            --file docker-compose.yml \
            --load
        timeout-minutes: 45

      - name: Run tests
        # -n 6 instead of -n auto: the Depot runner reports 16+ cores so
        # `auto` spawns 16+ xdist workers. Each worker independently imports
        # the full FastAPI app (~200 MB resident), so 16 × 200 MB ≈ 3.2 GB
        # just for the app object graph. Tests that use a per-test
        # `TestClient(app)` re-run the lifespan (brain scheduler, PG
        # listeners, WS subscriber) on top of that, and the runner's free
        # RAM gets tight enough that the OOM killer SIGKILLs random workers
        # — surfacing as `[gwN] node down: Not properly terminated` and
        # whichever test the worker happened to be running gets reported
        # as FAILED. The cascade hit 16+ workers and aborted the run on
        # PR #57 twice in a row even though the tests pass in isolation.
        # Capping at -n 6 keeps wall-clock under the 25 min timeout and
        # eliminates the memory contention.
        #
        # --dist=loadfile: keep all tests in a single FILE on the same
        # worker. Several test files (tests/brain/test_org_context.py,
        # test_partner_isolation.py) share module-scoped fixtures that
        # create rows the later tests look up. The default dist=load
        # distributes individual tests across workers, so the create-row
        # test runs on gw0 with one RUN_TAG but the lookup test runs on
        # gw5 with a different RUN_TAG (each worker imports the module
        # fresh, generating a new uuid.uuid4() RUN_TAG at module top).
        # That made test_role_check_constraint /
        # test_cascade_delete_org_removes_memberships fail with
        # NotNullViolationError once the OOM cascade was fixed and the
        # tests actually had a chance to run. loadfile preserves the
        # author's intended same-worker test ordering inside each file.
        run: docker compose run app pytest -vs -n 6 --dist=loadfile --ignore=src/test_worldcover.py
        timeout-minutes: 25

      - name: Start services for E2E
        run: |
          docker compose up -d app
          # Wait for the app to be healthy
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/healthz > /dev/null 2>&1; then
              echo "App is healthy"
              break
            fi
            echo "Waiting for app to start... ($i/30)"
            sleep 2
          done
        timeout-minutes: 5

      - name: Install frontend dependencies
        working-directory: frontendts
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontendts
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        working-directory: frontendts
        run: npx playwright test --reporter=github
        env:
          E2E_BASE_URL: http://localhost:8000
        timeout-minutes: 5

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: frontendts/test-results/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down
