name: Lint

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: astral-sh/ruff-action@0a44aa657929b3a0ddd44e4f780940070f600f0f # v3
        with:
          src: "."

  biome:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Biome
        uses: biomejs/setup-biome@1cbe33ead22c7a2fded3b52fa2893571c4f2003b # v2
        with:
          version: "2.1.1"

      - name: Run Biome
        run: biome ci
        working-directory: frontendts/

  basedpyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5f2d3e7d8ee0150b8f8b2f # v3

      - name: Install deps with uv
        run: uv sync --dev

      - name: Regenerate baseline for CI environment
        run: uv run basedpyright --writebaseline 2>/dev/null || true

      - name: Run basedpyright from project env
        run: uv run basedpyright
