# render.yaml — Render Blueprint for Mundi.ai (Hobby platform, starter services)
# https://render.com/docs/blueprint-spec
#
# Deploy: connect this repo in the Render Dashboard → "New Blueprint Instance"
# Secrets (marked `sync: false`) must be set manually in the Render dashboard.
# PostGIS: enable manually on mundi-db in the Render dashboard after creation.
#
# Estimated cost: ~$48.50/month (Hobby platform $0 + 6 services)
#
# Multi-region deployment strategy:
# ─────────────────────────────────
# Primary region: Oregon (us-west-2) — closest to infrastructure
# For Africa/Rwanda users, deploy a second instance:
#   1. Create a second Blueprint Instance in Render Dashboard
#   2. Set region to Frankfurt (eu-central-1) — closest to Rwanda
#   3. Point the domain (e.g., eu.gis.nozalabs.rw) to the Frankfurt instance
#   4. Use Cloudflare or similar CDN with geo-routing:
#      - Africa/Europe → Frankfurt instance
#      - Americas → Oregon instance
#   5. Both instances share the same database (cross-region reads via
#      connection pooling — PgBouncer recommended for production)
#
# CDN configuration:
# ─────────────────
# Static assets and tiles benefit from CDN caching. The app sets Cache-Control
# headers automatically:
#   - /assets/* (Vite hashed): immutable, 1 year
#   - Tile responses (.mvt, .pmtiles): 5min browser, 1h CDN (s-maxage)
#   - Favicons: 1h browser, 1d CDN
# Configure Cloudflare/Render CDN to respect these headers.

# ---------------------------------------------------------------------------
# Environment variable groups (simple key/value only)
# ---------------------------------------------------------------------------
envVarGroups:
  - name: mundi-shared
    envVars:
      - key: S3_BUCKET
        value: noza
      - key: S3_DEFAULT_REGION
        value: auto
      - key: OPENAI_MODEL
        value: deepseek/deepseek-v3.2
      - key: CDSAPI_URL
        value: https://cds.climate.copernicus.eu/api
      - key: OTEL_SERVICE_NAME
        value: ingabe
      - key: VITE_POSTHOG_KEY
        value: phc_W7tOZXWc5oPtpiYyyINii49GodL1NgyS6z30pNW8aTP
      - key: VITE_POSTHOG_HOST
        value: https://us.i.posthog.com

  - name: mundi-secrets
    envVars:
      - key: WEBSITE_DOMAIN
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: SH_CLIENT_ID
        sync: false
      - key: SH_CLIENT_SECRET
        sync: false
      - key: OPENEO_CLIENT_ID
        sync: false
      - key: OPENEO_CLIENT_SECRET
        sync: false
      - key: CDSAPI_KEY
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false

# ---------------------------------------------------------------------------
# Databases
# ---------------------------------------------------------------------------
databases:
  - name: mundi-db
    plan: starter
    postgresMajorVersion: 15
    ipAllowList: []

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ── Main application (FastAPI + frontend SPA) ──
  - type: web
    name: mundi-app
    runtime: docker
    plan: standard
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - fromGroup: mundi-shared
      - fromGroup: mundi-secrets
      # Database (fromDatabase must be inline, not in groups)
      - key: POSTGRES_HOST
        fromDatabase:
          name: mundi-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: mundi-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: mundi-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: mundi-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: mundi-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: mundi-db
          property: connectionString
      # Redis (fromService must be inline, not in groups)
      - key: REDIS_HOST
        fromService:
          name: mundi-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: mundi-redis
          type: redis
          property: port
      # App config
      - key: MUNDI_AUTH_MODE
        value: edit
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONIOENCODING
        value: utf-8
      - key: POSTGIS_LOCALHOST_POLICY
        value: docker_rewrite
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_EXPENSIVE
        value: 20/minute
      - key: RATE_LIMIT_HEAVY
        value: 10/minute
      - key: RATE_LIMIT_GENERAL
        value: 120/minute
      - key: RENDER_SERVICE
        value: app
      - key: QGIS_PROCESSING_URL
        fromService:
          name: qgis-processing
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      # Scaling & performance tuning
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DB_POOL_MAX_SIZE
        value: "25"
      - key: DB_READ_POOL_MAX_SIZE
        value: "25"
      - key: LOG_FORMAT
        value: json
    healthCheckPath: /healthz
    autoDeploy: true
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 80
      targetCPUPercent: 70

  # ── QGIS Processing service ──
  # autoDeploy disabled to save pipeline minutes — deploy manually from dashboard
  - type: web
    name: qgis-processing
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./qgis-processing/Dockerfile
    dockerContext: ./qgis-processing
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health
    autoDeploy: false

  # dagster-webserver removed — monitor via logs and Grafana (OTEL)
  # dagster run list / dagster run logs <run_id>

  # ── Dagster daemon (schedule/sensor runner) ──
  - type: worker
    name: dagster-daemon
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - fromGroup: mundi-shared
      - fromGroup: mundi-secrets
      # Database
      - key: POSTGRES_HOST
        fromDatabase:
          name: mundi-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: mundi-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: mundi-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: mundi-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: mundi-db
          property: password
      - key: DAGSTER_HOME
        value: /app
      - key: DAGSTER_PG_URL
        fromDatabase:
          name: mundi-db
          property: connectionString
      - key: RENDER_SERVICE
        value: dagster-daemon
    # autoDeploy disabled to save pipeline minutes — deploy manually from dashboard
    autoDeploy: false

  # ── NozaLabs landing page (Next.js + Clerk auth) ──
  # Domains: app.nozalabs.rw (primary)
  # After sign-in → redirects to Ingabe GIS at gis.nozalabs.rw
  - type: web
    name: noza-web
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./noza-web/Dockerfile
    dockerContext: ./noza-web
    envVars:
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: NEXT_PUBLIC_INGABE_URL
        value: https://gis.nozalabs.rw
    healthCheckPath: /
    # autoDeploy disabled to save pipeline minutes — deploy manually from dashboard
    autoDeploy: false

  # ── Redis ──
  - type: redis
    name: mundi-redis
    plan: starter
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
