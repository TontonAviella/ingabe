# render.yaml — Render Blueprint for Mundi.ai (hobby/free tier)
# https://render.com/docs/blueprint-spec
#
# Deploy: connect this repo in the Render Dashboard → "New Blueprint Instance"
# Secrets (marked `sync: false`) must be set manually in the Render dashboard.
# PostGIS: enable manually on mundi-db in the Render dashboard after creation.
#
# Dagster, QGIS processing, and backup cron are excluded to stay on free tier.
# Add them back when upgrading to paid plans.

# ---------------------------------------------------------------------------
# Environment variable groups
# ---------------------------------------------------------------------------
envVarGroups:
  - name: mundi-shared
    envVars:
      - key: S3_BUCKET
        value: noza
      - key: S3_DEFAULT_REGION
        value: auto
      - key: OPENAI_MODEL
        value: gpt-4.1-nano
      - key: CDSAPI_URL
        value: https://cds.climate.copernicus.eu/api
      - key: OTEL_SERVICE_NAME
        value: ingabe

# ---------------------------------------------------------------------------
# Databases
# ---------------------------------------------------------------------------
databases:
  - name: mundi-db
    plan: free
    postgresMajorVersion: 15
    ipAllowList: []

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ── Main application ──
  - type: web
    name: mundi-app
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - fromGroup: mundi-shared
      # Database
      - key: POSTGRES_HOST
        fromDatabase:
          name: mundi-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: mundi-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: mundi-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: mundi-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: mundi-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: mundi-db
          property: connectionString
      # Redis
      - key: REDIS_HOST
        fromService:
          name: mundi-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: mundi-redis
          type: redis
          property: port
      # Secrets (set in Render dashboard)
      - key: WEBSITE_DOMAIN
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: SH_CLIENT_ID
        sync: false
      - key: SH_CLIENT_SECRET
        sync: false
      - key: OPENEO_CLIENT_ID
        sync: false
      - key: OPENEO_CLIENT_SECRET
        sync: false
      - key: CDSAPI_KEY
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false
      # App config
      - key: MUNDI_AUTH_MODE
        value: edit
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONIOENCODING
        value: utf-8
      - key: POSTGIS_LOCALHOST_POLICY
        value: docker_rewrite
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_EXPENSIVE
        value: 20/minute
      - key: RATE_LIMIT_HEAVY
        value: 10/minute
      - key: RATE_LIMIT_GENERAL
        value: 120/minute
      - key: RENDER_SERVICE
        value: app
    healthCheckPath: /health
    autoDeploy: true

  # ── Redis ──
  - type: redis
    name: mundi-redis
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
